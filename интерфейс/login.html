<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в библиотеку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body{background:#f0f2f5;}
        .login-container{max-width:450px;margin:80px auto;}
        .card{border-radius:20px;}
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card">
        <div class="card-header text-center bg-white border-0 pt-4">
            <i class="bi bi-box-arrow-in-right" style="font-size:3rem;color:#2c3e50;"></i>
            <h3>Авторизация</h3>
        </div>
        <div class="card-body p-4">
            <form id="loginForm" action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label">Логин или Email</label>
                    <input type="text" class="form-control" name="username" id="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" name="password" id="password">
                </div>
                <button type="submit" class="btn btn-primary w-100" style="border-radius:40px;">Войти</button>
            </form>
            <hr>
            <p class="text-center"><a href="register.html">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
<script>
$(document).ready(function(){
    $("#loginForm").validate({
        rules: {
            username: { required: true },
            password: { required: true }
        },
        messages: {
            username: "Введите логин или email",
            password: "Введите пароль"
        },
        errorClass: "error",
        highlight: function(el){ $(el).addClass("is-invalid"); },
        unhighlight: function(el){ $(el).removeClass("is-invalid"); }
    });
});
</script>
</body>
</html>
