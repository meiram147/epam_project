<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/additional-methods.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body{background:#f0f2f5;}
        .register-container{max-width:500px;margin:50px auto;}
        .card{border-radius:20px;border:none;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
        .btn-register{background:#2c3e50;border-radius:40px;}
        .error{color:#dc3545;font-size:0.875rem;}
    </style>
</head>
<body>
<div class="container register-container">
    <div class="card">
        <div class="card-header text-center bg-white border-0 pt-4">
            <i class="bi bi-person-plus-fill" style="font-size:3rem;color:#2c3e50;"></i>
            <h3>Регистрация</h3>
        </div>
        <div class="card-body p-4">
            <form id="registerForm" action="/register" method="post">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя *</label>
                    <input type="text" class="form-control" name="username" id="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control" name="email" id="email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль *</label>
                    <input type="password" class="form-control" name="password" id="password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Подтверждение пароля *</label>
                    <input type="password" class="form-control" name="confirmPassword" id="confirmPassword">
                </div>
                <button type="submit" class="btn btn-primary btn-register w-100">Зарегистрироваться</button>
            </form>
            <hr>
            <p class="text-center">Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </div>
    </div>
</div>
<script>
$(document).ready(function(){
    $("#registerForm").validate({
        rules: {
            username: { required: true, minlength: 3, maxlength: 50 },
            email: { required: true, email: true },
            password: { required: true, minlength: 6 },
            confirmPassword: { required: true, equalTo: "#password" }
        },
        messages: {
            username: "Введите имя (от 3 символов)",
            email: "Введите корректный email",
            password: "Пароль не менее 6 символов",
            confirmPassword: "Пароли не совпадают"
        },
        errorElement: "div",
        errorClass: "error",
        highlight: function(el){ $(el).addClass("is-invalid"); },
        unhighlight: function(el){ $(el).removeClass("is-invalid"); }
    });
});
</script>
</body>
</html>
